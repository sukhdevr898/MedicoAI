<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>medicoAI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="antialiased font-poppins"> <!-- Added Poppins to body if not globally set -->
    <div id="splash-screen" class="fixed inset-0 bg-teal-500 flex flex-col justify-center items-center text-white z-[100]"> <!-- Ensure high z-index -->
        <i class="fas fa-heartbeat text-6xl mb-4 heartbeat-icon-animated"></i>
        <h1 class="text-4xl font-bold">medicoAI</h1>
    </div>

    <div id="app" class="hidden">
        <header class="bg-blue-600 text-white p-4 flex justify-between items-center">
            <h1 class="text-xl font-semibold">medicoAI</h1>
            <div>
                <button id="settings-button" class="text-white p-2 hover:bg-blue-700 rounded" aria-label="Open settings">
                    <i class="fas fa-cog text-xl"></i>
                </button>
            </div>
        </header>

        <main id="chat-area" class="flex-grow p-4 overflow-y-auto">
            <!-- Chat messages will be displayed here -->
            <!-- Removed placeholder <p>Chat area</p> as messages will populate this -->
        </main>

        <footer class="p-4 bg-gray-100 dark:bg-gray-800 flex items-center border-t dark:border-gray-700">
            <label for="image-upload" class="cursor-pointer mr-3 p-2 text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-500 rounded-md" aria-label="Attach an image">
                <i class="fas fa-paperclip text-xl"></i>
                <input type="file" id="image-upload" class="hidden" accept="image/*">
            </label>
            <input type="text" id="user-input" class="flex-grow p-3 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-white placeholder-gray-500 dark:placeholder-gray-400" placeholder="Type your message or upload an image...">
            <button id="send-button" class="ml-3 p-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg flex items-center" aria-label="Send message">
                <span class="mr-2 hidden sm:inline">Send</span> <i class="fas fa-paper-plane"></i>
            </button>
        </footer>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title" class="hidden fixed inset-0 bg-gray-600 bg-opacity-75 overflow-y-auto h-full w-full z-50 flex justify-center items-center p-4">
        <div class="relative mx-auto p-6 border w-full max-w-lg shadow-xl rounded-lg bg-white dark:bg-gray-800">
            <div class="flex justify-between items-center pb-4 border-b dark:border-gray-700">
                <p id="settings-modal-title" class="text-2xl font-semibold dark:text-white">Settings</p>
                <button id="close-settings-modal" class="text-gray-600 dark:text-gray-300 hover:text-red-600 dark:hover:text-red-400" aria-label="Close settings">
                    <i class="fas fa-times fa-xl"></i>
                </button>
            </div>
            <div class="mt-4 space-y-6">
                <!-- Theme Toggle -->
                <div class="mb-6">
                    <h3 class="text-lg font-medium mb-2 dark:text-gray-100">Theme</h3>
                    <div class="flex items-center justify-between bg-gray-50 dark:bg-gray-700 p-4 rounded-lg shadow-sm">
                        <span class="text-gray-800 dark:text-gray-200">Dark Mode</span>
                        <label for="theme-toggle" class="flex items-center cursor-pointer">
                            <div class="relative">
                                <input type="checkbox" id="theme-toggle" class="sr-only peer">
                                <div class="block bg-gray-300 peer-checked:bg-blue-600 w-14 h-8 rounded-full transition"></div>
                                <div class="dot absolute left-1 top-1 bg-white w-6 h-6 rounded-full transition-transform peer-checked:translate-x-full"></div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Font Size Adjustment -->
                <div>
                    <h3 class="text-lg font-medium mb-2 dark:text-gray-100">Font Size</h3>
                    <div class="flex items-center justify-between bg-gray-50 dark:bg-gray-700 p-4 rounded-lg shadow-sm">
                        <button id="font-smaller" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm rounded-lg focus:ring-2 focus:ring-blue-300 dark:focus:ring-blue-800" aria-label="Decrease font size">- A</button>
                        <button id="font-reset" class="px-5 py-2.5 bg-gray-300 hover:bg-gray-400 text-gray-800 font-medium text-sm rounded-lg focus:ring-2 focus:ring-gray-200 dark:bg-gray-600 dark:hover:bg-gray-500 dark:text-white dark:focus:ring-gray-700" aria-label="Reset font size">Normal</button>
                        <button id="font-larger" class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm rounded-lg focus:ring-2 focus:ring-blue-300 dark:focus:ring-blue-800" aria-label="Increase font size">+ A</button>
                    </div>
                    <p id="font-size-indicator" class="text-center text-sm text-gray-500 dark:text-gray-400 mt-2" aria-live="polite">Current: Normal</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
